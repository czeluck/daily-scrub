name: Fetch RSS Feeds

# Manual trigger only — press "Run workflow" in the Actions tab
on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit feeds.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch feeds
        run: python fetch_feeds.py

      - name: Commit and push feeds.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          git diff --cached --quiet || git commit -m "chore: refresh feeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
